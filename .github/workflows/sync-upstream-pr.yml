name: Sync upstream by PR

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Create sync branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/router-for-me/Cli-Proxy-API-Management-Center.git
          git fetch upstream main

          BRANCH="sync-upstream-main"
          git checkout -B "$BRANCH" origin/master

          git merge upstream/main --no-edit
          git push origin "$BRANCH" --force

      - name: Open pull request
        run: |
          gh pr create \
            --base master \
            --head sync-upstream-main \
            --title "Sync upstream main into master" \
            --body "自动检测到上游 main 有更新。本 PR 将 upstream/main 合并到本仓库 master。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}